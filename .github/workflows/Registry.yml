name: Auto-Register

on:
  release:
    types: [published]

jobs:
  register:
    name: Register new version
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Trigger JuliaRegistrator
        run: |
          gh api \
            repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
            -f body='@JuliaRegistrator register'
        env:
          GH_TOKEN: ${{ github.token }}
